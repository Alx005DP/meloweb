version: "3.9"

services:
  app:
    build: .
    container_name: marcoaldany_app
    restart: unless-stopped
    ports:
      - "4321:4321"
    env_file:
      - .env
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    container_name: marcoaldany_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
